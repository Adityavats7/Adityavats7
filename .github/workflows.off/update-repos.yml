name: Update Latest Repos

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate repo table
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          npm init -y
          npm install @octokit/rest
          node << 'EOF'
          const fs = require("fs");
          const { Octokit } = require("@octokit/rest");
          const octokit = new Octokit({ auth: process.env.GH_TOKEN });

          async function run() {
            const repos = await octokit.paginate(
              octokit.repos.listForUser,
              { username: "Adityavats7", per_page: 10 }
            );

            const rows = [];
            for (const r of repos.slice(0, 6)) {
              const commits = await octokit.repos.listCommits({
                owner: "Adityavats7",
                repo: r.name,
                per_page: 1,
              });
              const c = commits.data[0];
              rows.push(
                `| ${r.name} | ${c.sha.slice(0,7)} | ${c.commit.message.split("\n")[0]} |`
              );
            }

            const table =
              "| Repo | Commit | Message |\n|------|--------|---------|\n" +
              rows.join("\n");

            let readme = fs.readFileSync("README.md", "utf8");
            readme = readme.replace(
              /<!--START_REPOS-->[\\s\\S]*?<!--END_REPOS-->/,
              `<!--START_REPOS-->\n${table}\n<!--END_REPOS-->`
            );

            fs.writeFileSync("README.md", readme);
          }

          run();
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "chore(profile): update repos" || echo "No changes"
          git push